name: Export Rust Targets

on:
  workflow_dispatch:

jobs:
  export-targets:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Add Windows target
      run: rustup target add x86_64-pc-windows-gnu

    - name: Add macOS targets
      run: |
        rustup target add x86_64-apple-darwin
        rustup target add aarch64-apple-darwin

    - name: Upload Windows target
      uses: actions/upload-artifact@v4
      with:
        name: target-windows
        path: ~/.rustup/toolchains/*/lib/rustlib/x86_64-pc-windows-gnu

    - name: Upload macOS targets
      uses: actions/upload-artifact@v4
      with:
        name: target-macos
        path: |
          ~/.rustup/toolchains/*/lib/rustlib/x86_64-apple-darwin
          ~/.rustup/toolchains/*/lib/rustlib/aarch64-apple-darwin
