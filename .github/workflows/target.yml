name: Export Rust 1.93.0 Targets

on:
  workflow_dispatch:

jobs:
  export-targets:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust 1.93.0
      run: rustup toolchain install 1.93.0

    - name: Add Windows target (1.93.0)
      run: rustup target add x86_64-pc-windows-gnu --toolchain 1.93.0

    - name: Add macOS targets (1.93.0)
      run: |
        rustup target add x86_64-apple-darwin --toolchain 1.93.0
        rustup target add aarch64-apple-darwin --toolchain 1.93.0

    - name: Upload Windows target
      uses: actions/upload-artifact@v4
      with:
        name: target-windows-1.93.0
        path: ~/.rustup/toolchains/1.93.0-x86_64-unknown-linux-gnu/lib/rustlib/x86_64-pc-windows-gnu

    - name: Upload macOS targets
      uses: actions/upload-artifact@v4
      with:
        name: target-macos-1.93.0
        path: |
          ~/.rustup/toolchains/1.93.0-x86_64-unknown-linux-gnu/lib/rustlib/x86_64-apple-darwin
          ~/.rustup/toolchains/1.93.0-x86_64-unknown-linux-gnu/lib/rustlib/aarch64-apple-darwin
